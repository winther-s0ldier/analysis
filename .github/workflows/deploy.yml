name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            cd /home/ubuntu/analysis

            # Force server tree to match origin/main exactly.
            # Using fetch + reset --hard (instead of git pull) so force-pushes
            # don't leave the server stuck on "divergent branches" — the server
            # is a deploy target, not a place where local edits should survive.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Ensure required runtime dirs exist
            mkdir -p logs output uploads data

            # Ensure .env exists (with GOOGLE_API_KEY set on server)
            if [ ! -f .env ]; then
              echo "WARNING: .env file missing on server — pipeline will fail without GOOGLE_API_KEY"
            fi

            # Install / upgrade Python dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Build frontend (Vite → dist/)
            cd frontend
            npm install --quiet
            npm run build
            cd ..

            # Update supervisord config and reload ALL processes
            sudo cp supervisor_agents.conf /etc/supervisor/conf.d/adhopsun.conf
            sudo supervisorctl -c /etc/supervisor/supervisord.conf reread
            sudo supervisorctl -c /etc/supervisor/supervisord.conf update

            # Restart everything: agents first, then main backend
            sudo supervisorctl -c /etc/supervisor/supervisord.conf restart all-agents:*
            sleep 8
            sudo supervisorctl -c /etc/supervisor/supervisord.conf restart adk

            echo "Deploy complete"
            sudo supervisorctl -c /etc/supervisor/supervisord.conf status
