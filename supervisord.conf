; ── Main FastAPI backend (port 8000) ──────────────────────────────────────────

[program:adk]
command=/home/ubuntu/analysis/venv/bin/python -X utf8 main.py
directory=/home/ubuntu/analysis
user=ubuntu
autostart=true
autorestart=true
startretries=5
startsecs=15
stdout_logfile=/home/ubuntu/analysis/logs/main.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/home/ubuntu/analysis/logs/main.log
stderr_logfile_maxbytes=10MB
environment=USE_A2A_MULTISERVER="true",PYTHONIOENCODING="utf-8",PYTHONUTF8="1"

; ── Group all processes so one command restarts everything ─────────────────────

[group:all-agents]
programs=agent-profiler,agent-discovery,agent-coder,agent-synthesis,agent-critic,agent-dag-builder

[group:full-stack]
programs=agent-profiler,agent-discovery,agent-coder,agent-synthesis,agent-critic,agent-dag-builder,adk
