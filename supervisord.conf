[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
logfile=/home/ubuntu/analysis/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=5
loglevel=info
pidfile=/tmp/supervisord.pid
nodaemon=false
user=ubuntu

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

; ── Agent servers ──────────────────────────────────────────────────────────────

[program:agent-profiler]
command=/home/ubuntu/analysis/venv/bin/python agent_servers/server_base.py --agent profiler --port 8001
directory=/home/ubuntu/analysis
user=ubuntu
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/home/ubuntu/analysis/logs/profiler.log
stdout_logfile_maxbytes=5MB
stderr_logfile=/home/ubuntu/analysis/logs/profiler.log
stderr_logfile_maxbytes=5MB
environment=USE_A2A_MULTISERVER="true",PYTHONIOENCODING="utf-8",PYTHONUTF8="1"

