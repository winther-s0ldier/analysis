<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis</title>
    <meta name="description" content="Multi-agent data analysis pipeline">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css?v=19">
</head>

<body>
    <div class="top-progress" id="top-progress">
        <div class="top-progress-bar" id="top-progress-bar"></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-mark">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9" />
                        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4" />
                        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.4" />
                        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7" />
                    </svg>
                </div>
                <span class="logo-text">Data Analysis</span>
            </div>
            <button class="sidebar-collapse-btn" id="sidebar-toggle" title="Collapse sidebar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">Pipeline</div>

            <div class="stage-item" id="stage-1" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                </div>
                <span class="stage-label">Upload</span>
                <span class="stage-dot"></span>
            </div>

            <div class="stage-item" id="stage-2" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                </div>
                <span class="stage-label">Profile</span>
                <span class="stage-dot"></span>
            </div>

            <div class="stage-item" id="stage-3" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <span class="stage-label">Discover</span>
                <span class="stage-dot"></span>
            </div>

            <div class="stage-item" id="stage-4" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                </div>
                <span class="stage-label">Analyze</span>
                <span class="stage-dot"></span>
            </div>

            <div class="stage-item" id="stage-5" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="stage-label">Synthesize</span>
                <span class="stage-dot"></span>
            </div>

            <div class="stage-item" id="stage-6" data-status="pending">
                <div class="stage-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                    </svg>
                </div>
                <span class="stage-label">Report</span>
                <span class="stage-dot"></span>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">Multi-agent analysis pipeline</div>
        </div>
    </aside>

    <button class="sidebar-expand-btn hidden" id="sidebar-expand" title="Show sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6" />
        </svg>
    </button>

    <main class="chat-main">
        <!-- Circular progress ring — top-right corner, visible during/after a pipeline run -->
        <div class="progress-ring hidden" id="progress-ring" title="Pipeline progress">
            <svg width="52" height="52" viewBox="0 0 52 52">
                <circle class="progress-ring-track" cx="26" cy="26" r="22" stroke-width="3" />
                <circle class="progress-ring-fill" id="ring-fill" cx="26" cy="26" r="22" stroke-width="3"
                    stroke-dasharray="138.23" stroke-dashoffset="138.23" stroke="var(--accent)" />
            </svg>
            <span class="progress-ring-label" id="ring-label">0/0</span>
        </div>

        <div class="chat-scroll" id="chat-scroll">
            <div class="chat-container" id="chat-container">
                <div class="welcome-state" id="welcome-state">
                    <div class="welcome-icon">
                        <svg width="40" height="40" viewBox="0 0 20 20" fill="none">
                            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.8" />
                            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.3" />
                            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.3" />
                            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.6" />
                        </svg>
                    </div>
                    <h1 class="welcome-title">What would you like to analyze?</h1>
                    <p class="welcome-sub">Upload a data file to start a full multi-agent analysis pipeline.</p>
                    <div class="welcome-formats">
                        <span class="format-tag">CSV</span>
                        <span class="format-tag">XLSX</span>
                        <span class="format-tag">JSON</span>
                        <span class="format-tag">JSONL</span>
                        <span class="format-tag">Parquet</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Processing status bar (Claude Code style) -->
        <div class="processing-status hidden" id="processing-status">
            <div class="processing-spinner"></div>
            <span class="processing-text" id="processing-text">Initializing...</span>
        </div>

        <div class="input-area">
            <div class="input-wrapper" id="input-wrapper">
                <div class="file-attach hidden" id="file-attach">
                    <div class="file-attach-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                    </div>
                    <div class="file-attach-info">
                        <span class="file-attach-name" id="file-attach-name"></span>
                        <span class="file-attach-size" id="file-attach-size"></span>
                    </div>
                    <button class="file-attach-remove" id="file-attach-remove" title="Remove file">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <div class="input-row">
                    <button class="input-attach-btn" id="attach-btn" title="Attach data file">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                        </svg>
                    </button>
                    <textarea id="chat-input" class="chat-input"
                        placeholder="Upload a file to begin, or type a message…" rows="1"></textarea>
                    <button class="input-send-btn" id="send-btn" title="Send">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
                <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.json,.jsonl,.parquet" hidden>
            </div>
        </div>
    </main>

    <div class="drop-overlay hidden" id="drop-overlay">
        <div class="drop-overlay-content">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p>Drop your data file here</p>
        </div>
    </div>

    <!-- Lenis smooth scroll -->
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <script src="/static/app.js?v=19"></script>
</body>

</html>
